name: Deploy Nginx

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build -t nginx-demo .

      - name: Stop Existing Container
        run: |
          docker stop nginx-demo || true
          docker rm nginx-demo || true

      - name: Run Container
        run: |
          docker run -d \
          --name nginx-demo \
          -p 80:80 \
          nginx-demo
